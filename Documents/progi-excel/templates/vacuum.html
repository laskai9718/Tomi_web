<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <title>LabTrack - Vacuum teszt</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='mind-table.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>

    <h1>🛠️ Vacuum Teszt Rögzítése</h1>

    <nav>
        <a href="/beviteli">📋 Termelési adatbevitel</a>
        <a href="/labor">🔬 Laboros adatbevitel</a>
        <a href="/eredmeny">✅ Labor eredmények</a>
        <a href="/vacuum">🛠️ Vacuum Teszt Rögzítése</a>
        <a href="/tabla">📊 Összes adat megtekintése</a>
        <a href="/kiszereles">📦 Kiszerelés Rögzítése</a>
    </nav>
    
    <div class="clock-container">
        <div class="time-row">
            <div id="day">FRI</div>
            <div id="clock">00:00:00</div>
        </div>
        <div class="labels">
            <span>Nap</span>
            <span>Óra</span>
            <span>Perc</span>
            <span>Másodperc</span>
        </div>
    </div>
    
    <script>
        function updateClock() {
            let now = new Date();
            let days = ["Vasárnap", "Hétfő", "Kedd", "Szerda", "Csütörtök", "Péntek", "Szombat"];
            let day = days[now.getDay()];
            let hours = now.getHours().toString().padStart(2, "0");
            let minutes = now.getMinutes().toString().padStart(2, "0");
            let seconds = now.getSeconds().toString().padStart(2, "0");
            document.getElementById("day").innerText = day;
            document.getElementById("clock").innerText = `${hours}:${minutes}:${seconds}`;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
    
    <div class="form-container">
        <form method="POST">
            <label for="sarzs_szam_A">Sarzs szám A:</label>
            <input type="text" name="sarzs_szam_A" required>
            
            <!-- A vacuum teszt kezdeti idő input eltávolítva,
                 mivel a backend automatikusan fogja rögzíteni az aktuális időt -->
            
            <label for="vacuum_eredmeny">Vacuum eredmény:</label>
            <select name="vacuum_eredmeny" id="vacuum_eredmeny" required>
                <option value="">Válassz...</option>
                <option value="OK">✅ OK</option>
                <option value="NOK">❌ NOK</option>
            </select>
            
            <button type="submit">Mentés</button>
        </form>
    </div>
    
    <footer>
        <div class="logo-container">
            <img src="{{ url_for('static', filename='henkel_logo.png') }}" alt="Henkel Logo">
        </div>
    </footer>
    
    <script src="{{ url_for('static', filename='animations.js') }}"></script>
    <div id="error-container" style="display: none; text-align: center;">
        <img src="{{ url_for('static', filename='error.png') }}" alt="Hiba történt">
        <p>Valami hiba történt! Próbáld újra később.</p>
    </div>
    
</body>
</html>
