<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <title>LabTrack - Termelési Adatbevitel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ url_for('static', filename='mind-table.css') }}">
</head>

<body>

    <h1>📋 Termelési adatbevitel</h1>

    <nav>
        <a href="/beviteli">📋 Termelési adatbevitel</a>
        <a href="/labor">🔬 Laboros adatbevitel</a>
        <a href="/eredmeny">✅ Labor eredmények</a>
        <a href="/vacuum">🛠️ Vacuum Teszt Rögzítése</a>
        <a href="/tabla">📊 Összes adat megtekintése</a>
        <a href="/kiszereles">📦 Kiszerelés Rögzítése</a>
    </nav>

    <div class="clock-container">
        <div class="time-row">
            <div id="day">FRI</div>
            <div id="clock">00:00:00</div>
        </div>
        <div class="labels">
            <span>Nap</span>
            <span>Óra</span>
            <span>Perc</span>
            <span>Másodperc</span>
        </div>
    </div>

    <script>
        function updateClock() {
            let now = new Date();
            let days = ["Vasárnap", "Hétfő", "Kedd", "Szerda", "Csütörtök", "Péntek", "Szombat"];
            let day = days[now.getDay()];
            let hours = now.getHours().toString().padStart(2, '0');
            let minutes = now.getMinutes().toString().padStart(2, '0');
            let seconds = now.getSeconds().toString().padStart(2, '0');
            document.getElementById("day").innerText = day;
            document.getElementById("clock").innerText = `${hours}:${minutes}:${seconds}`;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
    <script>
        let anyagok = {
            "1500 Genava": "IDH-1500G",
            "1500 EU": "IDH-1500E",
            "1000 SR": "IDH-1000SR",
            "GF 3600": "IDH-GF3600",
            "TGF 2800": "IDH-TGF2800",
            "2900 Cleo": "IDH-2900C",
            "Henrico": "IDH-Henrico"
        };

        function frissitIDH() {
            let anyagNev = document.getElementById("anyag_nev").value;
            let idhMezo = document.getElementById("idh");
            if (anyagok[anyagNev]) {
                idhMezo.value = anyagok[anyagNev];
            }
        }

        function frissitNev() {
            let idhMezo = document.getElementById("idh").value;
            let anyagMezo = document.getElementById("anyag_nev");
            for (let anyag in anyagok) {
                if (anyagok[anyag] === idhMezo) {
                    anyagMezo.value = anyag;
                }
            }
        }
    </script>

    <div class="form-container">
        <form method="POST">
            <label for="anyag_nev">Anyag neve:</label>
            <select name="anyag_nev" id="anyag_nev" onchange="frissitIDH()" required>
                <option value="">Válassz...</option>
                <option value="1500 Genava">1500 Genava</option>
                <option value="1500 EU">1500 EU</option>
                <option value="1000 SR">1000 SR</option>
                <option value="GF 3600">GF 3600</option>
                <option value="TGF 2800">TGF 2800</option>
                <option value="2900 Cleo">2900 Cleo</option>
                 <option value="Henrico">Henrico</option>
            </select>

            <label for="idh">IDH szám:</label>
            <input type="text" name="idh" id="idh" oninput="frissitNev()" required>

            <label for="sarzs_szam_A">Sarzs szám A:</label>
            <input type="text" name="sarzs_szam_A" required>

            <label for="sarzs_szam_B">Sarzs szám B:</label>
            <input type="text" name="sarzs_szam_B">

            <!-- Itt már nincs dátum–idő input, mert annak rögzítését a backend automatikusan végzi -->

            <label for="sorszam">Minta sorszáma (pl. 2/8):</label>
            <input type="text" name="sorszam" id="sorszam" required>

            <button type="submit">Mentés</button>
        </form>
    </div>

    <footer>
        <div class="logo-container">
            <img src="{{ url_for('static', filename='henkel_logo.png') }}" alt="Henkel Logo">
        </div>
    </footer>

    <script src="{{ url_for('static', filename='animations.js') }}"></script>
    <div id="error-container" style="display: none; text-align: center;">
        <img src="{{ url_for('static', filename='error.png') }}" alt="Hiba történt">
        <p>Valami hiba történt! Próbáld újra később.</p>
    </div>

</body>

</html>
